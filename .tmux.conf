# terminal
set -g default-terminal "tmux-256color"
set -sa terminal-features ',xterm-kitty:RGB'

# general
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0

# activity
set -g monitor-activity on
set -g visual-activity on

# status bar
set -g status-position bottom
set -g status-interval 1

# subtle graphite bar
set -g status-style fg="#b8b8b8",bg="#262626"

# left/right
set -g status-left ""
set -g status-right "#[fg=#8a8a8a] %d/%m/%y  %H:%M "

# inactive windows
set -g window-status-format " #I > #(basename '#{pane_current_command}') "
set -g window-status-style fg="#7a7a7a",bg="#262626"

# active window
set -g window-status-current-format " #I > #(basename '#{pane_current_command}') "
set -g window-status-current-style fg="#f2f2f2",bg="#3a3a3a"

# activity
set -g window-status-activity-style fg="#e5d289",bg="#262626"

# pane borders
set -g pane-border-style fg="#353535"
set -g pane-active-border-style fg="#6a6a6a"

# messages
set -g message-style fg="#f0f0f0",bg="#3a3a3a"

# navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# splits in current directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# reload
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# vi mode
set-window-option -g mode-keys vi

# copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle \; send -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -i -f -selection primary | xclip -i -selection clipboard"